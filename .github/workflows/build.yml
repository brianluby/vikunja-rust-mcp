name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_name: vikunja-rust-mcp-linux-x86_64
            binary_name: vikunja-rust-mcp
          - name: macos-aarch64
            os: macos-14
            artifact_name: vikunja-rust-mcp-macos-aarch64
            binary_name: vikunja-rust-mcp
          - name: windows-x86_64
            os: windows-latest
            artifact_name: vikunja-rust-mcp-windows-x86_64
            binary_name: vikunja-rust-mcp.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.platform.binary_name }}" "dist/${{ matrix.platform.binary_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: dist/${{ matrix.platform.binary_name }}
          if-no-files-found: error
