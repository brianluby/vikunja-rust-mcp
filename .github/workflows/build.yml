name: Build

on:
  push:
    branches:
      - main
    tags:
      - v*
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - name: linux-x86_64
            os: ubuntu-latest
            artifact_name: vikunja-rust-mcp-linux-x86_64
            binary_name: vikunja-rust-mcp
          - name: macos-aarch64
            os: macos-14
            artifact_name: vikunja-rust-mcp-macos-aarch64
            binary_name: vikunja-rust-mcp
          - name: windows-x86_64
            os: windows-latest
            artifact_name: vikunja-rust-mcp-windows-x86_64
            binary_name: vikunja-rust-mcp.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package Unix binary
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.platform.binary_name }}" "dist/${{ matrix.platform.binary_name }}"
          chmod +x "dist/${{ matrix.platform.binary_name }}"
          tar -czf "dist/${{ matrix.platform.artifact_name }}.tar.gz" -C dist "${{ matrix.platform.binary_name }}"

      - name: Package Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/release/${{ matrix.platform.binary_name }}" "dist/${{ matrix.platform.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.platform.binary_name }}" -DestinationPath "dist/${{ matrix.platform.artifact_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.artifact_name }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish release packages
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Generate CycloneDX SBOM
        run: |
          cargo cyclonedx \
            --format json \
            --all-features \
            --target all \
            --spec-version 1.5 \
            --override-filename vikunja-rust-mcp-sbom.cdx
          mv vikunja-rust-mcp-sbom.cdx.json release/vikunja-rust-mcp-sbom.cdx.json

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
